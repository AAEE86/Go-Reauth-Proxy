basePath: /
definitions:
  admin.ServerInfo:
    properties:
      version:
        example: 0.0.1
        type: string
    type: object
  admin.proxyProtocolForceRequest:
    properties:
      proxy_protocol_force:
        example: true
        type: boolean
    type: object
  admin.proxyProtocolForceResponse:
    properties:
      proxy_protocol_force:
        example: false
        type: boolean
    type: object
  iptables.initRequest:
    properties:
      chain_name:
        example: KNOCK_FW
        type: string
      exempt_ports:
        example:
        - "7999"
        - "7999"
        items:
          type: string
        type: array
      parent_chain:
        description: string or []string
        example:
        - INPUT
        - DOCKER-USER
        items:
          type: string
        type: array
    type: object
  iptables.ipRequest:
    properties:
      ip:
        example: 192.168.1.100
        type: string
    type: object
  iptables.tcpRedirectRequest:
    properties:
      listen_port:
        example: 80
        type: integer
      target_port:
        example: 7999
        type: integer
    type: object
  models.AuthConfig:
    properties:
      auth_cache_ttl_seconds:
        description: Successful auth-result cache TTL in seconds. 0 disables the cache.
        example: 1
        type: integer
      auth_cache_unauthorized_ttl_seconds:
        description: Unauthorized auth-result cache TTL in seconds. 0 disables the
          cache.
        example: 1
        type: integer
      auth_host:
        example: auth.example.com
        type: string
      auth_port:
        description: Local Auth Service Port
        example: 3000
        type: integer
      auth_url:
        description: Relative Verify URL (default /api/auth/verify)
        example: /api/auth/verify
        type: string
      login_url:
        description: Relative Login URL (default /login)
        example: /login
        type: string
      logout_url:
        description: Relative Logout URL (default /api/auth/logout)
        example: /api/auth/logout
        type: string
      preflight_url:
        description: Relative Preflight URL (default /api/auth/preflight)
        example: /api/auth/preflight
        type: string
      public_auth_base_url:
        example: https://auth.example.com
        type: string
      public_http_port:
        example: 80
        type: integer
      public_https_port:
        example: 443
        type: integer
    type: object
  models.ForwardedHeadersConfig:
    properties:
      enabled:
        type: boolean
      omit_targets:
        items:
          type: string
        type: array
      updated_at:
        type: string
    type: object
  models.Rule:
    properties:
      path:
        description: Path prefix to match (e.g., "/api")
        example: /api
        type: string
      rewrite_html:
        description: If true, rewrites absolute paths in HTML response to include
          Path prefix.
        example: true
        type: boolean
      strip_path:
        description: If true, strips the Path prefix from the request before forwarding.
        example: true
        type: boolean
      target:
        description: Target URL (e.g., "http://localhost:7996")
        example: http://localhost:8080
        type: string
      use_auth:
        description: If true, invokes global authentication check before proxying.
        example: false
        type: boolean
      use_root_mode:
        description: If true, sets cookie and redirects matched path to /.
        example: false
        type: boolean
    type: object
  models.SSLDeployedCertificate:
    properties:
      cert:
        example: |-
          -----BEGIN CERTIFICATE-----
          ...
        type: string
      id:
        type: string
      is_default:
        type: boolean
      key:
        example: |-
          -----BEGIN RSA PRIVATE KEY-----
          ...
        type: string
      label:
        type: string
    type: object
  models.SSLDeployedCertificateInfo:
    properties:
      domains:
        items:
          type: string
        type: array
      id:
        type: string
      is_default:
        type: boolean
      label:
        type: string
    type: object
  models.SSLDeploymentMode:
    enum:
    - single_active
    - multi_sni
    type: string
    x-enum-varnames:
    - SSLDeploymentModeSingleActive
    - SSLDeploymentModeMultiSNI
  models.SSLDeploymentRequest:
    properties:
      cert:
        example: |-
          -----BEGIN CERTIFICATE-----
          ...
        type: string
      certificates:
        items:
          $ref: '#/definitions/models.SSLDeployedCertificate'
        type: array
      deployment_mode:
        allOf:
        - $ref: '#/definitions/models.SSLDeploymentMode'
        example: single_active
      key:
        example: |-
          -----BEGIN RSA PRIVATE KEY-----
          ...
        type: string
    type: object
  models.SSLInfo:
    properties:
      certificates:
        items:
          $ref: '#/definitions/models.SSLDeployedCertificateInfo'
        type: array
      deployment_mode:
        $ref: '#/definitions/models.SSLDeploymentMode'
      enabled:
        type: boolean
    type: object
  proxy.TrafficStats:
    properties:
      active_conns:
        type: integer
      error_5xx:
        type: integer
      total_in:
        type: integer
      total_out:
        type: integer
    type: object
  response.Response:
    properties:
      code:
        type: integer
      data: {}
      message:
        type: string
      success:
        type: boolean
      timestamp:
        type: integer
    type: object
host: localhost:7996
info:
  contact: {}
  description: API for managing proxy rules and iptables.
  license:
    name: MIT
    url: https://opensource.org/license/MIT
  title: Go-Reauth-Proxy
  version: "1.0"
paths:
  /api/auth:
    get:
      description: Get the configured global authentication URLs and port
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.AuthConfig'
              type: object
      summary: Get global auth config
      tags:
      - config
    post:
      consumes:
      - application/json
      description: Set the global authentication configurations (port, auth_url, login_url)
      parameters:
      - description: Auth configuration
        in: body
        name: config
        required: true
        schema:
          $ref: '#/definitions/models.AuthConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Set global auth config
      tags:
      - config
  /api/config/default-route:
    get:
      description: Get the configured default route when root route is requested
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  type: string
              type: object
      summary: Get default route
      tags:
      - config
    post:
      consumes:
      - application/json
      description: Set the configured default route when root route is requested
      parameters:
      - description: 'Route configuration, example: {\'
        in: body
        name: rule
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Set default route
      tags:
      - config
  /api/config/forwarded-headers:
    get:
      description: Get the current explicit forwarded-headers runtime configuration
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.ForwardedHeadersConfig'
              type: object
      summary: Get forwarded headers config
      tags:
      - config
    post:
      consumes:
      - application/json
      description: Replace the explicit forwarded-headers runtime configuration
      parameters:
      - description: Forwarded headers config
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/models.ForwardedHeadersConfig'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.ForwardedHeadersConfig'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Set forwarded headers config
      tags:
      - config
  /api/config/proxy-protocol:
    get:
      description: Get whether the proxy port requires Proxy Protocol header
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/admin.proxyProtocolForceResponse'
              type: object
      summary: Get proxy protocol force
      tags:
      - config
    post:
      consumes:
      - application/json
      description: Enable or disable requiring Proxy Protocol header on proxy port
      parameters:
      - description: Proxy protocol options
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/admin.proxyProtocolForceRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/admin.proxyProtocolForceResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Set proxy protocol force
      tags:
      - config
  /api/info:
    get:
      description: Get version and other server info
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/admin.ServerInfo'
              type: object
      summary: Get server info
      tags:
      - info
  /api/iptables/allow:
    post:
      consumes:
      - application/json
      description: Add an ALLOW rule for a specific IP
      parameters:
      - description: IP to allow
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/iptables.ipRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Allow IP
      tags:
      - iptables
  /api/iptables/allow-all:
    post:
      description: Remove the catch-all DROP rule
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Allow all traffic
      tags:
      - iptables
  /api/iptables/block:
    post:
      consumes:
      - application/json
      description: Add a DROP rule for a specific IP
      parameters:
      - description: IP to block
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/iptables.ipRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Block IP
      tags:
      - iptables
  /api/iptables/block-all:
    post:
      description: Add a catch-all DROP rule at the end of the chain
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Block all traffic
      tags:
      - iptables
  /api/iptables/clean:
    post:
      description: Remove the custom iptables chain
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Clean iptables
      tags:
      - iptables
  /api/iptables/flush:
    post:
      description: Flush all rules in the custom chain
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Flush iptables rules
      tags:
      - iptables
  /api/iptables/init:
    post:
      consumes:
      - application/json
      description: Initialize the custom iptables chain
      parameters:
      - description: Initialization options
        in: body
        name: request
        schema:
          $ref: '#/definitions/iptables.initRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Initialize iptables
      tags:
      - iptables
  /api/iptables/list:
    get:
      description: List all rules in the custom chain
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    type: string
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: List iptables rules
      tags:
      - iptables
  /api/iptables/remove:
    post:
      consumes:
      - application/json
      description: Remove an ALLOW/BLOCK rule for a specific IP
      parameters:
      - description: IP to remove
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/iptables.ipRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Remove IP rule
      tags:
      - iptables
  /api/iptables/tcp-redirect:
    delete:
      consumes:
      - application/json
      description: Remove a tcp REDIRECT rule from nat PREROUTING for both iptables
        and ip6tables
      parameters:
      - description: TCP redirect configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/iptables.tcpRedirectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Clear TCP redirect
      tags:
      - iptables
    post:
      consumes:
      - application/json
      description: Ensure a tcp REDIRECT rule exists in nat PREROUTING for both iptables
        and ip6tables
      parameters:
      - description: TCP redirect configuration
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/iptables.tcpRedirectRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.Response'
      summary: Ensure TCP redirect
      tags:
      - iptables
  /api/rules:
    delete:
      description: Remove all proxy rules
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: Flush all rules
      tags:
      - rules
    get:
      description: Get all configured proxy rules
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Rule'
                  type: array
              type: object
      summary: Get all rules
      tags:
      - rules
    post:
      consumes:
      - application/json
      description: Set proxy rules (overrides existing rules)
      parameters:
      - description: List of rules to set
        in: body
        name: rules
        required: true
        schema:
          items:
            $ref: '#/definitions/models.Rule'
          type: array
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/models.Rule'
                  type: array
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Set rules
      tags:
      - rules
  /api/ssl:
    delete:
      description: Clear the configured SSL certificate and disable HTTPS on the proxy
        port
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
      summary: Clear SSL certificate
      tags:
      - ssl
    get:
      description: Check if dynamic SSL is currently enabled and configured on the
        proxy port
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/models.SSLInfo'
              type: object
      summary: Get SSL status
      tags:
      - ssl
    post:
      consumes:
      - application/json
      description: Upload a legacy PEM certificate/key pair or a deployed SSL bundle
        to enable HTTPS on the proxy port
      parameters:
      - description: SSL deployment payload
        in: body
        name: ssl
        required: true
        schema:
          $ref: '#/definitions/models.SSLDeploymentRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Response'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.Response'
      summary: Set SSL certificate
      tags:
      - ssl
  /api/traffic:
    get:
      description: Get proxy traffic stats (bytes in/out, active logged-in users in
        last 2 minutes, and 5xx count)
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.Response'
            - properties:
                data:
                  $ref: '#/definitions/proxy.TrafficStats'
              type: object
      summary: Get traffic stats
      tags:
      - traffic
swagger: "2.0"
